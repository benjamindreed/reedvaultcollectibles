name: Sync eBay Catalog
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 20 }
      - run: npm ci
      - run: node scripts/fetch-ebay.mjs
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_SELLER: ${{ secrets.EBAY_SELLER }}
          # Optional: unlocks Grail detection via Trading API Store Category lookup.
          # Safe to leave unset — the script no-ops Grail detection without it.
          EBAY_USER_TOKEN: ${{ secrets.EBAY_USER_TOKEN }}
      - run: |
          git config user.name "catalog-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/data/products.json
          git diff --staged --quiet || git commit -m "sync: $(date -u +%F_%H:%M)"
          git push
